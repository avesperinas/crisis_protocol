services:
  backend:
    build:
      context: ./backend
      target: prod
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/crisis_protocol.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE: ""
        VITE_WS_BASE: ""
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
